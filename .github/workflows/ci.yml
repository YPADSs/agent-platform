name: CI
# noop: retrigger required check
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: CI policy guards
        run: node scripts/ci-policy-guards.mjs
      - name: Validate Netlify config
        run: node scripts/validate-netlify-config.mjs
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test --silent
      - name: Build
        run: npm run build
