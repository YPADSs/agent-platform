name: CI
on:
  push:
    branches: ["main"]
  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3
      - name: Setup Node.js
        uses: actions/setup-node@3
        with:
          node-version: 20
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test --silent
      - name: Build
        run: npm run build
